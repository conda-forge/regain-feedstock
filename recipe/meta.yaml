{% set name = "regain" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ee95f53ddbdbbf12fd11e03f2b5da72373fafc38ae29911513af7fe043062ed1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.6

  run:
    - python >=3.6
    - numpy >=1.8.2
    - scikit-learn >=0.17

test:
  imports:
    - regain
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/fdtomasi/regain
  summary: REGAIN (Regularised Graphical Inference).
  description: |
    Regularised graph inference across multiple time stamps, considering the influence of latent variables. 
    It inherits functionalities from the scikit-learn package.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://github.com/fdtomasi/regain
  dev_url: https://github.com/fdtomasi/regain

extra:
  recipe-maintainers:
    - Vlasovets
